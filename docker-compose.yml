services:
  server:
    build: .
    # Read only container for security!
    read_only: true

    # These are the paths from host to be mounted (readonly)
    # to the container from host
    volumes:
      - ./SiteContent:/usr/share/nginx/html/:ro
      - ./nginx-server.conf:/etc/nginx/conf.d/default.conf:ro
      # Nginx still needs some write access to temp dirs, exceptions go here!
      # tmpfs definitions live inside RAM.
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          mode: 0777
      - type: tmpfs
        target: /var/run
        tmpfs:
          mode: 0777
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 0777

    # Drop linux capabilities to reduce attack surface.
    cap_drop:
      - ALL

    # Prevent processes from gaining additional privileges
    security_opt:
      - no-new-privileges:true

    # Make sure the entry process in the container is under the nginx user
    # with user id 101 and group id 101
    user: "101:101"

    # Limit the amount of resources to be allocated to the container.
    # The following are quite generous, you may want to limit them as needed.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 500M

    # Map port(s) in the container to the host on localhost only for safety...
    # HOST_IP:HOST_PORT:CONTAINER_PORT
    ports:
      - 127.0.0.1:8080:8080

    # Make sure the container restarts to recover itself unless explicitly
    # stopped by the user.
    restart: unless-stopped
