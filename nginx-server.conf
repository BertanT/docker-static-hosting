server {
    # Listen on port 80
    listen 80;
    server_name localhost;

    # Hide nginx version etc.
    server_tokens off;

    # This should be the default path anyway, but putting it here anyway...
    root /usr/share/nginx/html/;

    # NGINX performance optimizations
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;

    # Make sure the following headers are preserved when calling add_header in more specific contexts.
    # WARNING: This requires nginx 1.29 and above.
    # Security headers will be lost in earlier versions and the configuration must be updated appropriately!!!
    add_header_inherit merge;

    # Security stuff with pretty strict permissions. May need to adjust depending on your use case.
    add_header Content-Security-Policy "default-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Allow access to static content normally
    location / {
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    # Configure browser caching
    # Basically just tells the browser how long to cache files.
    # On a lot of static-site cases, this can break your site if misconfigured!!!
    # Make sure to inspect the cache expiration dates, and note that some static site generators such as
    #   iWeb may not generate cache busting filenames!

    # HTML Content
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # CSS and JavaScript
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Images, fonts, etc.9
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|mp3|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # In case you define a custom error pages :)
    error_page 404 /404.html;
    # error_page 403 /403.html;
}
